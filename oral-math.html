<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>口算出题器 - 蒙蒙学习库</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <a class="brand" href="./index.html" aria-label="蒙蒙学习库首页">
        <img src="./assets/brand/brand-logo.png" alt="蒙蒙学习库">
      </a>

      <nav class="side-nav" id="sideNav"></nav>

      <div class="profile-card">
        <span class="profile-avatar" aria-hidden="true">萌</span>
        <div>
          <strong>177****0675</strong>
          <span>VIP会员</span>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="hello">
          <h1>口算出题器</h1>
          <p>小学 1-6 年级口算练习，先用规则生成，后续接入你的题库文件。</p>
        </div>
      </header>

      <section class="oral-view" id="oralMathView" aria-label="口算出题器">
        <div class="oral-head">
          <div class="section-title">
            <span class="section-icon oral-title-icon" aria-hidden="true">✎</span>
            <div>
              <h2 id="oralMathTitle">二年级口算</h2>
              <p id="oralMathSubtitle">二年级共 9 个题型</p>
            </div>
          </div>
          <label class="grade-select">
            <span>年级</span>
            <select id="oralGradeSelect" aria-label="选择年级"></select>
          </label>
        </div>

        <div class="oral-topic-grid" id="oralTopicGrid"></div>

        <div class="oral-sheet is-hidden" id="oralSheet">
          <div class="oral-sheet-head">
            <div>
              <h2 id="oralSheetTitle">口算练习</h2>
              <p id="oralSheetMeta">共 0 道题</p>
            </div>
            <div class="oral-sheet-actions">
              <button class="ghost-button" id="oralAnswerButton" type="button">显示答案</button>
              <button class="ghost-button" id="oralPrintButton" type="button">打印</button>
            </div>
          </div>
          <div class="oral-question-grid" id="oralQuestionGrid"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./oral-math.js"></script>
</body>
</html>
