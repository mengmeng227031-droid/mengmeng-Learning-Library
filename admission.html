<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全国名校资源地图</title>
  <link rel="stylesheet" href="./admission.css">
</head>
<body>
  <main class="admission-page" id="admissionApp">
    <a class="library-link" href="./learning.html" aria-label="返回学习库">学习库</a>

    <section class="map-board" id="mapBoard" aria-label="全国名校资源地图">
      <div class="map-canvas" id="mapCanvas">
        <svg class="province-map" viewBox="0 0 1000 680" aria-label="交互式中国高校资源地图">
          <g class="province-layer" id="provinceLayer"></g>
        </svg>
      </div>
      <div class="map-tools" aria-label="地图缩放工具">
        <button type="button" data-map-action="zoom-in" aria-label="放大地图">+</button>
        <button type="button" data-map-action="zoom-out" aria-label="缩小地图">−</button>
        <button type="button" data-map-action="reset" aria-label="重置地图">↺</button>
      </div>
      <aside class="hover-detail" id="hoverDetail" aria-live="polite"></aside>
    </section>

    <section class="support-author" aria-labelledby="supportAuthorTitle">
      <button class="reward-thumb" id="rewardThumb" type="button" aria-label="打开赞赏码大图">
        <img src="./assets/admission/reward-code.png" alt="赞赏码">
      </button>
      <div>
        <h2 id="supportAuthorTitle">支持作者</h2>
        <p>开发不易，如果觉得这个工具有所帮助，欢迎打赏，作者非常需要您的帮助！（点击赞赏码图片可打开大图）</p>
      </div>
    </section>
  </main>

  <div class="reward-sheet" id="rewardSheet" aria-hidden="true">
    <button class="reward-backdrop" type="button" data-reward-close aria-label="关闭赞赏码大图"></button>
    <section class="reward-panel" role="dialog" aria-modal="true" aria-labelledby="rewardSheetTitle">
      <button class="reward-close" type="button" data-reward-close aria-label="关闭">×</button>
      <h2 id="rewardSheetTitle">支持作者</h2>
      <p>感谢你的支持，点击空白处可关闭。</p>
      <img src="./assets/admission/reward-code.png" alt="赞赏码大图">
    </section>
  </div>

  <div class="school-detail-sheet" id="schoolDetailSheet" aria-hidden="true">
    <button class="school-detail-backdrop" type="button" data-school-detail-close aria-label="关闭学校详情"></button>
    <section class="school-detail-panel" id="schoolDetailPanel" role="dialog" aria-modal="true" aria-labelledby="schoolDetailTitle"></section>
  </div>

  <script src="./data/gaokao-schools.js"></script>
  <script src="./admission.js"></script>
</body>
</html>
